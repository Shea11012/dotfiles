name: image-tools

networks:
  tools:
    driver: bridge

services:
  network-service:
    image: alpine
    container_name: tool-network
    ports:
      - "3003:3001" # gpt-load
      - "3004:8080" # octopus
    command: tail -f /dev/null
    networks:
      - tools

  caddy:
    build: ./caddy
    container_name: caddy-upload
    user: "1000:1000"
    cap_add:
      - NET_ADMIN
    ports:
      - "80:80"
      - "8080:8080"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./caddy/conf:/etc/caddy
      - ./caddy/assets:/srv
      - /home/mxy/workspace/mxy/dotfiles:/srv/dotfiles
    restart: unless-stopped

  sub-store:
    image: xream/sub-store:http-meta
    container_name: sub-store
    environment:
      - SUB_STORE_FRONTEND_BACKEND_PATH=/2cXaAxRGfddmGz2yx1wA
      - SUB_STORE_BACKEND_API_PORT=3002
    ports:
      - "3002:3002"
    volumes:
      - ./sub-store/:/opt/app/data

  openlist:
    image: ghcr.io/openlistteam/openlist-git:latest-aio
    container_name: openlist
    user: "1000:1000"
    volumes:
      - "./openlist/data:/opt/openlist/data"
    ports:
      - "5244:5244"
    environment:
      - UMASK=022
      - TZ=Asia/Shanghai
      - OPENLIST_ADMIN_PASSWORD=admin
    restart: unless-stopped

  openviking:
    image: ghcr.io/volcengine/openviking:latest
    container_name: openviking
    ports:
      - "1933:1933"
      - "8020:8020"
    volumes:
      - "./openviking/:/app/.openviking"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:1933/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    restart: unless-stopped
    command: /bin/sh -c "chown -R ${UID:-1000}:${GID:-1000} /app/.openviking || true; openviking-console-entrypoint"

  gpt-load:
    image: ghcr.io/tbphp/gpt-load:latest
    container_name: gpt-load
    restart: always
    user: "1000:1000"
    volumes:
      - ./gpt-load/data:/app/data
    env_file:
      - ./gpt-load/.env
    healthcheck:
      test: wget -q --spider -T 10 -O /dev/null http://localhost:${PORT:-3001}/health
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    network_mode: "service:network-service"

  prompt-optmizier:
    image: linshen/prompt-optimizer:latest
    container_name: prompt-optmizier
    restart: unless-stopped
    ports:
      - "28081:80"
