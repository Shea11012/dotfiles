# the default speed for mouse movement and scrolling
baseMouseSpeed: 750.0
baseScrollSpeed: 20.0

# the rest of the config defines the layers with their bindings
layers:
  # the first layer is active at start
  - name: initial
    bindings:
      f+d: layer mouse
      capslock: esc
  # a layer for mouse movement
  - name: mouse
    # when true, keys that are not mapped keep their original meaning
    passThrough: true
    bindings:
      # quit mouse layer (only needed if toggled in via other means)
      q: layer initial
      # keep the mouse layer active
      space: layer mouse
      l: move  1  0
      h: move -1  0
      j: move  0  1
      k: move  0 -1
      p: scroll up
      n: scroll down
      leftalt: speed 4.0
      e: speed 0.3
      f: button left
      d: button middle
      s: button right
      x: leftmeta+q
