<?xml version='1.0'?>
<!DOCTYPE fontconfig SYSTEM 'urn:fontconfig:fonts.dtd'>
<fontconfig>
 <!-- system-ui 原生-->
 <match target="pattern">
  <test name="family">
   <string>system-ui</string>
  </test>
  <edit binding="strong" mode="prepend" name="family">
   <string>sans-serif</string>
  </edit>
 </match>

 <!-- sans-serif UI文字（修复 Chrome 兼容性） -->
 <match target="pattern">
  <test name="family">
   <string>sans-serif</string>
  </test>
  <!-- 注意：必须拆分成多个 edit 标签，逐个 prepend -->
  <edit binding="strong" mode="prepend" name="family"><string>SF Pro Display</string></edit>
  <edit binding="strong" mode="prepend" name="family"><string>LXGW WenKai GB</string></edit>
  <edit binding="strong" mode="prepend" name="family"><string>Twemoji</string></edit>
  <edit binding="strong" mode="prepend" name="family"><string>Noto Color Emoji</string></edit>
  <edit binding="strong" mode="prepend" name="family"><string>Symbols Nerd Font Mono</string></edit>
  <edit binding="strong" mode="prepend" name="family"><string>Font Awesome 7 Free</string></edit>
  <edit binding="strong" mode="prepend" name="family"><string>Font Awesome 7 Brands</string></edit>
 </match>

 <!-- serif 衬线字体（修复 Chrome 兼容性）-->
 <match target="pattern">
  <test name="family">
   <string>serif</string>
  </test>
  <edit binding="strong" mode="prepend" name="family"><string>SF Pro Display</string></edit>
  <edit binding="strong" mode="prepend" name="family"><string>LXGW WenKai GB</string></edit>
  <edit binding="strong" mode="prepend" name="family"><string>Twemoji</string></edit>
  <edit binding="strong" mode="prepend" name="family"><string>Noto Color Emoji</string></edit>
  <edit binding="strong" mode="prepend" name="family"><string>Symbols Nerd Font Mono</string></edit>
  <edit binding="strong" mode="prepend" name="family"><string>Font Awesome 7 Free</string></edit>
  <edit binding="strong" mode="prepend" name="family"><string>Font Awesome 7 Brands</string></edit>
 </match>

 <!-- monospace 代码、终端专用（修复 Chrome 兼容性）-->
 <match target="pattern">
  <test name="family">
   <string>monospace</string>
  </test>
  <edit binding="strong" mode="prepend" name="family"><string>Maple Mono NF</string></edit>
  <edit binding="strong" mode="prepend" name="family"><string>LXGW WenKai GB</string></edit>
  <edit binding="strong" mode="prepend" name="family"><string>Twemoji</string></edit>
  <edit binding="strong" mode="prepend" name="family"><string>Noto Color Emoji</string></edit>
  <edit binding="strong" mode="prepend" name="family"><string>Symbols Nerd Font Mono</string></edit>
  <edit binding="strong" mode="prepend" name="family"><string>Font Awesome 7 Free</string></edit>
  <edit binding="strong" mode="prepend" name="family"><string>Font Awesome 7 Brands</string></edit>
 </match>

 <dir>~/.local/share/fonts</dir>
</fontconfig>
